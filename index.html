<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modelo de Folder - Exercícios Domiciliares (Atenção Básica)</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Cropper.js -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        @media (min-width: 768px) {
            .fold-guide { position: relative; }
            .fold-guide::after { content: ''; position: absolute; top: 0; bottom: 0; width: 1px; border-left: 1px dashed rgba(156, 163, 175, 0.4); pointer-events: none; }
            .fold-left::after { right: 0; }
            .fold-right::after { left: 0; }
            .print-page { width: 100%; aspect-ratio: 297/210; display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 1.5rem !important; }
        }

        @media (max-width: 767px) {
            .print-page:not(.hidden) { display: flex !important; flex-direction: column !important; gap: 2rem !important; height: auto !important; aspect-ratio: auto !important; padding: 1.5rem !important; }
            .print-page.hidden { display: none !important; }
            .fold-guide::after { display: none !important; }
        }

        /* FORÇANDO O BOLD PARA SER EXTRA BOLD E DESTACAR DO SEMIBOLD */
        b, strong, [style*="bold"], [style*="700"] { font-weight: 800 !important; }

        /* CONFIGURAÇÃO BLINDADA PARA IMPRESSÃO PERFEITA */
        @page { size: A4 landscape; margin: 0mm; }
        @media print {
            * { 
                -webkit-print-color-adjust: exact !important; 
                print-color-adjust: exact !important; 
                color-adjust: exact !important; 
                box-sizing: border-box !important;
            }
            html, body { 
                width: 297mm; 
                height: 210mm; 
                margin: 0 !important; 
                padding: 0 !important; 
                background: white !important; 
            }
            main, #main-content-container, #main-content { 
                padding: 0 !important; 
                margin: 0 !important; 
                gap: 0 !important; 
                display: block !important; 
                max-width: 100% !important;
                width: 100% !important;
            }
            .no-print { display: none !important; }
            
            .print-page { 
                width: 297mm !important; 
                height: 210mm !important; 
                max-height: 210mm !important; 
                margin: 0 !important; 
                border: none !important; 
                border-radius: 0 !important;
                box-shadow: none !important; 
                padding: 5mm !important; 
                display: grid !important; 
                grid-template-columns: repeat(3, 1fr) !important; 
                gap: 5mm !important; 
                box-sizing: border-box !important; 
                background-color: white !important; 
                background-image: none !important; 
                overflow: hidden !important; 
                page-break-inside: avoid !important;
            }
            .print-page:first-of-type { page-break-after: always !important; break-after: page !important; }
            .print-page:last-of-type { page-break-after: auto !important; break-after: auto !important; }

            .fold-guide::after { display: none !important; }
            [contenteditable="true"] { outline: none !important; border: none !important; background-color: transparent !important; }
            .delete-btn { display: none !important; }
        }

        [contenteditable="true"] { transition: all 0.2s; cursor: text; border-radius: 6px; padding: 2px 4px; }
        [contenteditable="true"]:hover { background-color: rgba(239, 246, 255, 0.9); outline: 1.5px dashed #3b82f6; }
        [contenteditable="true"]:focus { background-color: #ffffff; outline: 2px solid #2563eb; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }

        .img-upload-area { position: relative; cursor: pointer; transition: all 0.2s; }
        .img-upload-area:hover { outline: 2px dashed #3b82f6; }

        .cropper-container { width: 100% !important; height: 50vh !important; max-height: 500px; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col relative pb-10">

    <!-- TOOLBAR FLUTUANTE COM INDICADOR DIGITAL DE TAMANHO DA FONTE -->
    <div id="text-toolbar" class="no-print fixed z-[200] hidden bg-slate-900 text-white rounded-2xl shadow-2xl p-2.5 flex items-center gap-1.5 opacity-0 transform -translate-y-4 transition-all duration-300 pointer-events-auto left-1/2 -translate-x-1/2 top-[120px] md:top-[85px]">
        <button onclick="changeFontSize(-1)" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 font-bold text-sm transition-colors" title="Diminuir Fonte">A-</button>
        <span id="font-size-display" class="text-xs font-mono font-bold bg-slate-800 px-2 py-1 rounded-lg text-slate-300 min-w-[38px] text-center">11px</span>
        <button onclick="changeFontSize(1)" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 font-bold text-xl transition-colors" title="Aumentar Fonte">A+</button>
        <div class="w-px h-6 bg-slate-700 mx-1"></div>
        
        <button onclick="formatText('bold')" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 font-serif font-black text-lg transition-colors" title="Negrito (B)">B</button>
        <button onclick="toggleSemibold()" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 font-sans font-semibold text-sm transition-colors" title="Semibold (Sb)">Sb</button>
        <div class="w-px h-6 bg-slate-700 mx-1"></div>
        
        <button onclick="formatText('justifyLeft')" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 transition-colors" title="Alinhar à Esquerda">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h12v-2H3v2zm0-4h18v-2H3v2zm0-4h12V7H3v2zm0-6v2h18V3H3z"/></svg>
        </button>
        <button onclick="formatText('justifyCenter')" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 transition-colors" title="Centralizar">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm3-4h12v-2H6v2zm-3-4h18v-2H3v2zm3-4h12V7H6v2zm-3-6v2h18V3H3z"/></svg>
        </button>
        <button onclick="formatText('justifyRight')" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 transition-colors" title="Alinhar à Direita">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm6-4h12v-2H9v2zm-6-4h18v-2H3v2zm6-4h12V7H9v2zm-6-6v2h18V3H3z"/></svg>
        </button>
        <button onclick="formatText('justifyFull')" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-700 transition-colors" title="Justificar">
            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M3 21h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18v-2H3v2zm0-4h18V7H3v2zm0-6v2h18V3H3z"/></svg>
        </button>
    </div>

    <!-- TELA DE LOGIN -->
    <div id="login-modal" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Acesso Restrito</h2>
            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">E-mail</label>
                    <input type="email" id="email-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Senha</label>
                    <input type="password" id="password-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none" required>
                </div>
                <div id="login-error" class="text-xs text-red-500 font-bold hidden text-center">Credenciais inválidas. Tente novamente.</div>
                <button type="submit" id="btn-entrar" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-2">
                    Entrar no Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- MODAL DE CORTE DE IMAGEM -->
    <div id="crop-modal" class="no-print fixed inset-0 z-[150] bg-slate-900/90 hidden flex-col items-center justify-center p-4">
        <div class="bg-white rounded-2xl w-full max-w-3xl overflow-hidden shadow-2xl flex flex-col">
            <div class="p-4 bg-slate-800 text-white flex justify-between items-center">
                <h3 class="font-bold">Ajustar Imagem</h3>
                <button onclick="fecharCrop()" class="text-slate-400 hover:text-white font-bold">✕ Fechar</button>
            </div>
            <div class="bg-slate-900 w-full h-[50vh] max-h-[500px] flex items-center justify-center">
                <img id="crop-image" src="" class="max-w-full max-h-full block">
            </div>
            <div class="p-4 bg-white flex flex-wrap gap-2 justify-between items-center">
                <div class="flex gap-2">
                    <button onclick="cropper.zoom(0.1)" class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-lg" title="Aproximar">🔍+</button>
                    <button onclick="cropper.zoom(-0.1)" class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-lg" title="Afastar">🔍-</button>
                    <button onclick="cropper.rotate(90)" class="bg-slate-100 hover:bg-slate-200 text-slate-800 font-bold px-3 py-2 rounded-lg" title="Girar">↻</button>
                </div>
                <button onclick="aplicarCorte()" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold px-6 py-2 rounded-lg shadow-md">
                    Cortar e Salvar
                </button>
            </div>
        </div>
    </div>

    <!-- CABEÇALHO -->
    <header id="main-header" class="no-print bg-slate-900 text-white shadow-md p-4 sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3 w-full lg:w-auto">
                <div class="p-2.5 bg-emerald-500 rounded-xl text-slate-900 shrink-0">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Editor SUS</h1>
                    <div class="flex items-center gap-2">
                        <p class="text-[11px] text-slate-400" id="user-email-display">usuario@ubs.com</p>
                        <button id="btn-logout" class="text-[10px] font-bold bg-slate-800 hover:bg-slate-700 px-2 py-0.5 rounded text-red-400 transition-colors">Sair</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto flex-wrap justify-center">
                
                <!-- NOVO GERENCIADOR DE ARQUIVOS -->
                <div class="flex items-center gap-1.5 bg-slate-800 px-3 py-2 rounded-xl w-full sm:w-auto justify-center shadow-inner border border-slate-700">
                    <input type="text" id="folder-name-input" placeholder="Nome do Paciente..." class="bg-slate-900 text-white text-[13px] font-bold px-3 py-1.5 rounded-lg outline-none border border-slate-600 focus:border-amber-500 flex-1 sm:w-36 transition-colors" title="Nome para salvar a prescrição">
                    <div class="w-px h-6 bg-slate-600 mx-1"></div>
                    <select id="saved-folders-select" onchange="carregarFolder(this.value)" class="bg-slate-900 text-slate-300 text-xs font-bold px-2 py-1.5 rounded-lg outline-none border border-slate-600 hover:border-slate-500 transition-colors cursor-pointer w-28 md:w-32" title="Carregar folder salvo">
                        <option value="">📂 Carregar...</option>
                    </select>
                    <button onclick="deletarFolderAtual()" class="text-slate-500 hover:text-red-400 transition-colors p-1.5 rounded-lg hover:bg-slate-700" title="Excluir este paciente do sistema">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                    </button>
                </div>

                <!-- Seletor de Layouts -->
                <select id="layout-select" onchange="mudarLayout(this.value)" class="bg-slate-800 text-white text-xs font-bold px-3 py-2 rounded-xl outline-none border border-slate-700 hover:bg-slate-700 transition-colors cursor-pointer" title="Quantidade de Exercícios">
                    <option value="6">Layout: 6 Ex</option>
                    <option value="5">Layout: 5 Ex</option>
                    <option value="4">Layout: 4 Ex</option>
                    <option value="3">Layout: 3 Ex</option>
                </select>

                <div class="flex items-center gap-2.5 bg-slate-800 px-3.5 py-2 rounded-xl">
                    <button onclick="mudarTema('sus-blue')" class="w-6 h-6 rounded-full bg-cyan-600 border-2 border-slate-700 hover:scale-110 transition-transform" title="Azul SUS"></button>
                    <button onclick="mudarTema('sus-green')" class="w-6 h-6 rounded-full bg-emerald-600 border-2 border-slate-700 hover:scale-110 transition-transform" title="Verde Saúde"></button>
                    <button onclick="mudarTema('outubro-rosa')" class="w-6 h-6 rounded-full bg-pink-500 border-2 border-slate-700 hover:scale-110 transition-transform" title="Outubro Rosa"></button>
                    <button onclick="mudarTema('novembro-azul')" class="w-6 h-6 rounded-full bg-blue-600 border-2 border-slate-700 hover:scale-110 transition-transform" title="Novembro Azul"></button>
                    <div class="w-px h-5 bg-slate-600 mx-1"></div>
                    <label class="relative cursor-pointer hover:scale-110 transition-transform" title="Escolher Cor Personalizada">
                        <div class="w-6 h-6 rounded-full border-2 border-slate-700" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);"></div>
                        <input type="color" id="customColorPicker" class="opacity-0 absolute inset-0 w-0 h-0 cursor-pointer">
                    </label>
                </div>

                <div class="inline-flex rounded-xl border border-slate-700 bg-slate-950 p-1 w-full sm:w-auto">
                    <button onclick="mostrarPagina('externa')" id="btn-ext" class="flex-1 px-4 py-2 rounded-lg text-xs font-bold uppercase bg-emerald-500 text-slate-950 transition-all">Capa/Aba</button>
                    <button onclick="mostrarPagina('interna')" id="btn-int" class="flex-1 px-4 py-2 rounded-lg text-xs font-bold uppercase text-slate-400 transition-all">Exercícios</button>
                </div>

                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btn-reset" class="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white font-bold px-4 py-2 rounded-xl text-xs md:text-sm uppercase tracking-wider transition-all" title="Começar folder do zero">📄 Novo</button>
                    <button id="btn-salvar" onclick="window.salvarProgresso()" class="flex-1 sm:flex-none bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-4 py-2 rounded-xl text-xs md:text-sm uppercase tracking-wider flex items-center justify-center gap-1 shadow-lg transition-all">💾 Salvar</button>
                    <button onclick="abrirImpressao()" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-xl text-xs md:text-sm uppercase tracking-wider shadow-lg transition-all">🖨️ Imprimir</button>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-1 max-w-7xl mx-auto w-full p-4 md:p-8 flex flex-col justify-center items-center gap-6 hidden">
        <div class="w-full max-w-5xl" id="main-content-container">
            <!-- Conteúdo Injetado -->
        </div>
    </main>

    <!-- Modal de Impressão -->
    <div id="print-modal" class="no-print fixed inset-0 bg-slate-900/80 z-[250] hidden flex-col items-center justify-center p-4 opacity-0 transition-opacity duration-300">
        <div class="bg-white rounded-3xl max-w-sm w-full p-6 md:p-8 shadow-2xl transform scale-95 transition-transform duration-300" id="print-modal-content">
            <h3 class="text-xl font-black text-slate-800 text-center mb-3">Salvar seu Folder</h3>
            <p class="text-sm text-slate-600 text-center mb-6 leading-relaxed">
                <span class="block bg-slate-50 p-3 rounded-xl border border-slate-100 text-left mt-2">
                    <strong>1.</strong> Toque nos <strong>3 pontinhos</strong> do navegador.<br>
                    <strong>2.</strong> Vá em <strong>Compartilhar</strong> ➔ <strong>Imprimir</strong>.<br>
                    <strong>3.</strong> Escolha <strong>Salvar como PDF</strong> no formato <strong>Paisagem</strong>.
                </span>
            </p>
            <button onclick="fecharModalPrint()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-500 transition-colors shadow-md">
                Entendi!
            </button>
        </div>
    </div>

    <!-- TEMPLATE PADRÃO DO FOLDER -->
    <template id="default-template">
        <!-- PÁGINA 1: EXTERNA -->
        <div id="pagina-externa" class="print-page bg-white shadow-xl rounded-3xl mx-auto border border-slate-200 p-6 md:p-8 relative transition-all duration-300">
            <div class="fold-guide fold-left p-5 flex flex-col justify-between h-full bg-slate-50/50 rounded-2xl border border-slate-100">
                <div class="flex-1 flex flex-col">
                    <div class="theme-badge inline-block text-[11px] font-black px-3 py-1.5 rounded uppercase tracking-widest mb-4 w-max" contenteditable="true">Dicas Importantes</div>
                    <h3 class="text-base font-black theme-text mb-3 uppercase tracking-tight" contenteditable="true">Preparando o Corpo</h3>
                    <p class="text-sm text-slate-600 mb-5 leading-relaxed font-medium text-justify" contenteditable="true">A prática regular de exercícios em casa melhora flexibilidade, equilíbrio e reduz dores crônicas.</p>
                    
                    <div id="lista-dicas" class="space-y-3 flex-1">
                        <div class="flex gap-2.5 items-start group relative">
                            <span class="text-emerald-500 font-black text-sm mt-0.5" contenteditable="true">✓</span>
                            <p class="text-xs text-slate-600 leading-relaxed w-full pr-4 text-justify font-medium" contenteditable="true"><strong>Roupas Leves:</strong> Use tecidos confortáveis e faça os exercícios em local seguro.</p>
                            <button onclick="this.parentElement.remove(); window.marcarAlteracao && window.marcarAlteracao();" class="delete-btn no-print hidden group-hover:flex absolute right-0 top-0 text-red-500 hover:text-red-700 text-xs font-black p-1">✖</button>
                        </div>
                        <div class="flex gap-2.5 items-start group relative">
                            <span class="text-emerald-500 font-black text-sm mt-0.5" contenteditable="true">✓</span>
                            <p class="text-xs text-slate-600 leading-relaxed w-full pr-4 text-justify font-medium" contenteditable="true"><strong>Hidratação:</strong> Beba pequenos goles de água antes e durante a rotina.</p>
                            <button onclick="this.parentElement.remove(); window.marcarAlteracao && window.marcarAlteracao();" class="delete-btn no-print hidden group-hover:flex absolute right-0 top-0 text-red-500 hover:text-red-700 text-xs font-black p-1">✖</button>
                        </div>
                        <div class="flex gap-2.5 items-start group relative">
                            <span class="text-emerald-500 font-black text-sm mt-0.5" contenteditable="true">✓</span>
                            <p class="text-xs text-slate-600 leading-relaxed w-full pr-4 text-justify font-medium" contenteditable="true"><strong>Sinais de Alerta:</strong> Pare se sentir tontura, falta de ar ou dores articulares agudas.</p>
                            <button onclick="this.parentElement.remove(); window.marcarAlteracao && window.marcarAlteracao();" class="delete-btn no-print hidden group-hover:flex absolute right-0 top-0 text-red-500 hover:text-red-700 text-xs font-black p-1">✖</button>
                        </div>
                    </div>
                    
                    <button onclick="adicionarDica()" class="no-print mt-4 text-[11px] text-emerald-600 font-bold hover:text-emerald-800 bg-emerald-50 px-3 py-2 rounded-lg border border-emerald-100 transition-colors w-full">
                        + Adicionar Nova Dica
                    </button>
                </div>
                <div class="mt-6 pt-4 border-t border-slate-200 text-center">
                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-wider" contenteditable="true">Atenção Básica: Cuidado Contínuo</p>
                </div>
            </div>

            <div class="fold-guide fold-right p-5 flex flex-col justify-between h-full bg-white">
                <div class="text-center flex-1 flex flex-col">
                    <div class="theme-bg-light p-4 rounded-2xl mb-5 flex justify-center border border-slate-50">
                        <div class="flex items-center gap-3 font-black text-base tracking-widest text-slate-800">
                            <svg class="w-8 h-8 theme-text-svg" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M19 10.5h-5.5V5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v5.5H5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5h5.5V19c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-5.5H19c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z"/>
                            </svg>
                            <span contenteditable="true">SUS / APS</span>
                        </div>
                    </div>
                    <h3 class="text-sm font-black text-slate-800 uppercase tracking-widest mb-3" contenteditable="true">Acompanhamento</h3>
                    <p class="text-xs text-slate-500 mb-5" contenteditable="true">Anote as informações da sua equipe de saúde de referência:</p>

                        <div class="bg-white p-1.5 rounded-lg shadow-sm border border-slate-200 mt-auto">
                            <div class="flex justify-between items-center border-b border-slate-100 pb-1">
                                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider" contenteditable="true">Séries:</span>
                                <span class="font-black text-slate-800 text-xs" contenteditable="true">3 de 10x</span>
                            </div>
                            <div class="flex justify-between items-center pt-1">
                                <span class="text-[10px] text-slate-500 font-bold uppercase tracking-wider" contenteditable="true">Intervalo:</span>
                                <span class="font-black text-slate-800 text-xs" contenteditable="true">45 segs</span>

        </div>

    <input type="file" id="imageUploader" accept="image/png, image/jpeg, image/webp" class="hidden">

    <script>
        // === CONTROLE DE ALTERAÇÕES NÃO SALVAS ===
        window.hasUnsavedChanges = false;

        window.marcarAlteracao = function() {
            if (!window.hasUnsavedChanges) {
                window.hasUnsavedChanges = true;
                atualizarBotaoSalvar(false);
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('main-content').addEventListener('input', window.marcarAlteracao);
        });

        // === TOOLBAR DE TEXTO BLINDADA ===
        const toolbar = document.getElementById('text-toolbar');
        const visorFonte = document.getElementById('font-size-display');
        let activeEditable = null;
        let isChangingFont = false;

        function sincronizarVisor() {
            if (!activeEditable || isChangingFont) return;
            const style = window.getComputedStyle(activeEditable);
            const size = Math.round(parseFloat(style.fontSize));
            if (visorFonte) visorFonte.textContent = size + 'px';
        }

        function abrirMenu(elemento) {
            activeEditable = elemento;
            toolbar.classList.remove('hidden');
            sincronizarVisor();
            setTimeout(() => { 
                toolbar.classList.remove('opacity-0', '-translate-y-4'); 
                toolbar.classList.add('opacity-100', 'translate-y-0'); 
            }, 10);
        }

        document.addEventListener('selectionchange', () => {
            const selection = window.getSelection();
            if (selection && selection.rangeCount > 0) {
                let node = selection.focusNode;
                if (node) {
                    if (node.nodeType !== Node.ELEMENT_NODE) node = node.parentNode;
                    const editable = node.closest('[contenteditable="true"]');
                    if (editable) abrirMenu(editable);
                }
            }
        });

        document.addEventListener('mousedown', (e) => {
            if (toolbar.contains(e.target)) return;
            const editable = e.target.closest('[contenteditable="true"]');
            if (!editable) {
                toolbar.classList.remove('opacity-100', 'translate-y-0');
                toolbar.classList.add('opacity-0', '-translate-y-4');
                setTimeout(() => toolbar.classList.add('hidden'), 300);
                activeEditable = null;
            }
        });

        toolbar.addEventListener('mousedown', (e) => { e.preventDefault(); });

        function formatText(command) { 
            document.execCommand(command, false, null); 
            if (activeEditable) activeEditable.focus(); 
            window.marcarAlteracao();
        }

        function toggleSemibold() {
            if (!activeEditable) return;
            const selection = window.getSelection();
            if (selection.rangeCount > 0 && !selection.isCollapsed && activeEditable.contains(selection.anchorNode)) {
                const range = selection.getRangeAt(0);
                const span = document.createElement('span');
                span.style.fontWeight = '600';
                span.appendChild(range.extractContents());
                range.insertNode(span);
            } else {
                const currentWeight = window.getComputedStyle(activeEditable).fontWeight;
                if (currentWeight === '600' || currentWeight === 'bold' || currentWeight === '700' || currentWeight === '800') {
                    activeEditable.style.fontWeight = '500'; 
                } else {
                    activeEditable.style.fontWeight = '600'; 
                }
            }
            activeEditable.focus();
            window.marcarAlteracao();
        }

        function changeFontSize(step) {
            if (!activeEditable) return;
            isChangingFont = true; 
            
            const style = window.getComputedStyle(activeEditable);
            let currentSize = parseFloat(style.fontSize) || 11;
            let novoTamanho = Math.round(currentSize + (step * 2));
            
            activeEditable.style.fontSize = novoTamanho + 'px';
            activeEditable.style.lineHeight = '1.3'; 
            
            const childNodes = activeEditable.querySelectorAll('*');
            childNodes.forEach(child => {
                child.style.fontSize = '';
                child.style.lineHeight = '';
            });
            
            if (visorFonte) visorFonte.textContent = novoTamanho + 'px';
            window.marcarAlteracao();
            
            setTimeout(() => { isChangingFont = false; }, 50);
        }

        // === AJUSTE DE PROPORÇÃO DA IMAGEM MANUAL ===
        window.mudarAlturaImagem = function(event, btn, delta) {
            event.preventDefault();
            event.stopPropagation();
            
            const imgContainer = btn.closest('.img-upload-area');
            let currentHeight = parseInt(window.getComputedStyle(imgContainer).height);
            let newHeight = currentHeight + delta;
            
            if (newHeight >= 80 && newHeight <= 400) {
                imgContainer.style.height = newHeight + 'px';
                window.marcarAlteracao();
            }
        };

        // === LAYOUT ENGINE ===
        window.layoutAtual = '6';

        function mudarLayout(qtd) {
            window.layoutAtual = qtd;
            
            const config = {
                '6': { show: [1,2,3,4,5,6], hr: [1,2,3], imgH: '180px' },
                '5': { show: [1,2,3,4,5], hr: [1,2], imgH: { 1: '180px', 2: '180px', 3: '180px', 4: '180px', 5: '280px'} },
                '4': { show: [1,2,3,5], hr: [1], imgH: { 1: '180px', 2: '180px', 3: '280px', 5: '280px'} },
                '3': { show: [1,3,5], hr: [], imgH: '280px' }
            };
            
            [1,2,3,4,5,6].forEach(id => {
                const el = document.getElementById('ex-container-' + id);
                if(el) {
                    if (config[qtd].show.includes(id)) {
                        el.classList.remove('hidden');
                        el.classList.add('flex');
                        
                        const imgBox = el.querySelector('.img-upload-area');
                        if (imgBox) {
                            let h = typeof config[qtd].imgH === 'string' ? config[qtd].imgH : config[qtd].imgH[id];
                            imgBox.style.height = h;
                        }
                    } else {
                        el.classList.add('hidden');
                        el.classList.remove('flex');
                    }
                }
            });

            [1,2,3].forEach(id => {
                const hr = document.getElementById('hr-' + id);
                if(hr) {
                    if (config[qtd].hr.includes(id)) hr.classList.remove('hidden');
                    else hr.classList.add('hidden');
                }
            });
            window.marcarAlteracao();
        }

        // === CROPPER DE IMAGEM ===
        let alvoImagemAtual = null;
        let formatoImagemAtual = 'rect';
        let cropper = null;

        function abrirCropModal(elemento, formato) {
            alvoImagemAtual = elemento;
            formatoImagemAtual = formato;
            document.getElementById('imageUploader').click();
        }

        document.getElementById('imageUploader').addEventListener('change', function(event) {
            const arquivo = event.target.files[0];
            if (arquivo) {
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    const cropImage = document.getElementById('crop-image');
                    cropImage.src = e.target.result;
                    document.getElementById('crop-modal').classList.remove('hidden');
                    document.getElementById('crop-modal').classList.add('flex');
                    
                    if (cropper) cropper.destroy();

                    const rect = alvoImagemAtual.getBoundingClientRect();
                    const proporcaoExata = (rect.width && rect.height) ? (rect.width / rect.height) : (16/9);
                    
                    cropper = new Cropper(cropImage, {
                        aspectRatio: formatoImagemAtual === 'circle' ? 1 : proporcaoExata,
                        viewMode: 1,
                        dragMode: 'move',
                        autoCropArea: 1,
                        restore: false,
                        guides: true,
                        center: true,
                        highlight: false,
                        cropBoxMovable: true,
                        cropBoxResizable: true,
                        toggleDragModeOnDblclick: false,
                    });
                };
                leitor.readAsDataURL(arquivo);
            }
            event.target.value = ''; 
        });

        function fecharCrop() {
            document.getElementById('crop-modal').classList.add('hidden');
            document.getElementById('crop-modal').classList.remove('flex');
            if (cropper) cropper.destroy();
        }

        function aplicarCorte() {
            if (!cropper) return;
            
            const canvas = cropper.getCroppedCanvas({
                maxWidth: 1000,
                maxHeight: 1000,
                fillColor: '#fff'
            });
            
            const base64Crop = canvas.toDataURL('image/webp', 0.88);
            
            const containerDaFoto = alvoImagemAtual.firstElementChild;
            containerDaFoto.innerHTML = '';
            
            alvoImagemAtual.classList.remove('border-2', 'border-dashed', 'border-slate-300');
            
            const imgNode = document.createElement('img');
            imgNode.src = base64Crop;
            imgNode.className = formatoImagemAtual === 'circle' ? 'w-full h-full object-cover rounded-full' : 'w-full h-full object-cover rounded-xl';
            containerDaFoto.appendChild(imgNode);
            
            fecharCrop();
            window.marcarAlteracao();
        }

        function abrirImpressao() { 
            try { 
                window.print(); 
                setTimeout(() => { if(window.innerWidth < 1024) mostrarModalPrint(); }, 800); 
            } catch(e) { 
                mostrarModalPrint(); 
            } 
        }
        
        function mostrarModalPrint() {
            const modal = document.getElementById('print-modal');
            const content = document.getElementById('print-modal-content');
            if(!modal) return;
            modal.classList.remove('hidden'); modal.classList.add('flex');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); }, 10);
        }

        function fecharModalPrint() {
            const modal = document.getElementById('print-modal');
            const content = document.getElementById('print-modal-content');
            if(!modal) return;
            modal.classList.add('opacity-0'); content.classList.add('scale-95');
            setTimeout(() => { modal.classList.add('hidden'); modal.classList.remove('flex'); }, 300);
        }

        function adicionarDica() {
            const lista = document.getElementById('lista-dicas');
            const novaDica = document.createElement('div');
            novaDica.className = 'flex gap-2.5 items-start group relative';
            novaDica.innerHTML = `
                <span class="text-emerald-500 font-black text-sm mt-0.5" contenteditable="true">✓</span>
                <p class="text-xs text-slate-600 leading-relaxed w-full pr-4 text-justify font-medium" contenteditable="true"><strong>Nova Dica:</strong> Edite este texto livremente.</p>
                <button onclick="this.parentElement.remove(); window.marcarAlteracao && window.marcarAlteracao();" class="delete-btn no-print hidden group-hover:flex absolute right-0 top-0 text-red-500 hover:text-red-700 text-xs font-black p-1" title="Apagar Dica">✖</button>
            `;
            lista.appendChild(novaDica);
            window.marcarAlteracao();
        }

        function mostrarPagina(pagina) {
            const pagExt = document.getElementById('pagina-externa');
            const pagInt = document.getElementById('pagina-interna');
            const btnExt = document.getElementById('btn-ext');
            const btnInt = document.getElementById('btn-int');

            if (pagina === 'externa') {
                pagExt.classList.remove('hidden'); pagInt.classList.add('hidden');
                btnExt.classList.add('bg-emerald-500', 'text-slate-950'); btnExt.classList.remove('text-slate-400');
                btnInt.classList.remove('bg-emerald-500', 'text-slate-950'); btnInt.classList.add('text-slate-400');
            } else {
                pagInt.classList.remove('hidden'); pagExt.classList.add('hidden');
                btnInt.classList.add('bg-emerald-500', 'text-slate-950'); btnInt.classList.remove('text-slate-400');
                btnExt.classList.remove('bg-emerald-500', 'text-slate-950'); btnExt.classList.add('text-slate-400');
            }
        }

        const configuracoesTemas = {
            'sus-blue': { bg: 'bg-cyan-600', text: 'text-cyan-600', border: 'border-cyan-600', badgeBg: 'bg-cyan-100', badgeText: 'text-cyan-900', lightBg: 'bg-cyan-50' },
            'sus-green': { bg: 'bg-emerald-600', text: 'text-emerald-600', border: 'border-emerald-600', badgeBg: 'bg-emerald-100', badgeText: 'text-emerald-900', lightBg: 'bg-emerald-50/40' },
            'outubro-rosa': { bg: 'bg-pink-500', text: 'text-pink-500', border: 'border-pink-500', badgeBg: 'bg-pink-100', badgeText: 'text-pink-900', lightBg: 'bg-pink-50/40' },
            'novembro-azul': { bg: 'bg-blue-600', text: 'text-blue-600', border: 'border-blue-600', badgeBg: 'bg-blue-100', badgeText: 'text-blue-900', lightBg: 'bg-blue-50/40' }
        };

        window.temaAtual = 'sus-green'; 
        window.customColorHex = null;

        document.getElementById('customColorPicker').addEventListener('input', (e) => { mudarTema('custom', e.target.value); window.marcarAlteracao(); });

        function mudarTema(nomeTema, customHex = null) {
            window.temaAtual = nomeTema;
            
            document.querySelectorAll('.theme-bg, .theme-text, .theme-text-svg, .theme-badge, .theme-bg-light, .theme-border').forEach(el => { el.style.backgroundColor = ''; el.style.color = ''; el.style.borderColor = ''; });

            if (nomeTema === 'custom') {
                window.customColorHex = customHex;
                document.querySelectorAll('.theme-bg').forEach(el => { el.style.backgroundColor = customHex; });
                document.querySelectorAll('.theme-text, .theme-text-svg').forEach(el => { el.style.color = customHex; });
                document.querySelectorAll('.theme-border').forEach(el => { el.style.borderColor = customHex; });
                document.querySelectorAll('.theme-badge').forEach(el => { el.style.backgroundColor = customHex + '20'; el.style.color = customHex; });
                document.querySelectorAll('.theme-bg-light').forEach(el => { el.style.backgroundColor = customHex + '15'; });
            } else {
                window.customColorHex = null;
                const configs = configuracoesTemas[nomeTema];
                document.querySelectorAll('.theme-bg').forEach(el => { el.classList.remove('bg-cyan-600', 'bg-emerald-600', 'bg-pink-500', 'bg-blue-600'); el.classList.add(configs.bg); });
                document.querySelectorAll('.theme-text, .theme-text-svg').forEach(el => { el.classList.remove('text-cyan-600', 'text-emerald-600', 'text-pink-500', 'text-blue-600', 'text-teal-700'); el.classList.add(configs.text); });
                document.querySelectorAll('.theme-border').forEach(el => { el.classList.remove('border-cyan-600', 'border-emerald-600', 'border-pink-500', 'border-blue-600'); el.classList.add(configs.border); });
                document.querySelectorAll('.theme-badge').forEach(el => { el.className = `theme-badge inline-block text-[11px] font-black px-3 py-1.5 rounded uppercase tracking-widest mb-4 w-max ${configs.badgeBg} ${configs.badgeText}`; });
                document.querySelectorAll('.theme-bg-light').forEach(el => { el.classList.remove('bg-cyan-50', 'bg-emerald-50/40', 'bg-pink-50/40', 'bg-blue-50/40'); el.classList.add(configs.lightBg); });
            }
        }
    </script>

    <!-- FIREBASE (BANCO DE DADOS EM NUVEM MULTI-PACIENTE) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD0l49VdT8hB8dxyS1LxU5lDAY_Bcs08tc",
          authDomain: "foldermaker-55c5e.firebaseapp.com",
          projectId: "foldermaker-55c5e",
          storageBucket: "foldermaker-55c5e.firebasestorage.app",
          messagingSenderId: "831477487081",
          appId: "1:831477487081:web:5e8ca0f38be76d2d832778"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        let currentFolderId = ""; // Fica vazio para forçar o usuário a dar um nome

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-email-display').textContent = user.email;
                await atualizarListaFolders();
                iniciarFolderEmBranco();
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = document.getElementById('btn-entrar');
            btn.textContent = "Verificando...";
            document.getElementById('login-error').classList.add('hidden');
            signInWithEmailAndPassword(auth, document.getElementById('email-input').value, document.getElementById('password-input').value)
                .catch(() => { btn.textContent = "Entrar no Sistema"; document.getElementById('login-error').classList.remove('hidden'); });
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        // Busca todos os pacientes salvos na nuvem e preenche o Select
        window.atualizarListaFolders = async function() {
            const select = document.getElementById('saved-folders-select');
            select.innerHTML = '<option value="">📂 Carregar...</option>';
            try {
                const querySnapshot = await getDocs(collection(db, "folders"));
                querySnapshot.forEach((doc) => {
                    // Impede de listar arquivos de sistema antigos se houver
                    if(doc.id !== "folder_padrao") {
                        const option = document.createElement('option');
                        option.value = doc.id;
                        option.textContent = doc.id;
                        if(doc.id === currentFolderId) option.selected = true;
                        select.appendChild(option);
                    }
                });
            } catch (e) {
                console.error("Erro ao carregar lista de pacientes", e);
            }
        };

        // Carrega as informações do paciente selecionado no menu
        window.carregarFolder = async function(id) {
            if(!id) return;
            try {
                const docSnap = await getDoc(doc(db, "folders", id));
                if (docSnap.exists()) {
                    currentFolderId = id;
                    document.getElementById('folder-name-input').value = id;
                    
                    const data = docSnap.data();
                    document.getElementById('main-content-container').innerHTML = data.htmlContent;
                    
                    if (data.tema) {
                        window.temaAtual = data.tema;
                        window.customColorHex = data.customColor;
                        if(data.tema === 'custom') document.getElementById('customColorPicker').value = data.customColor;
                        mudarTema(data.tema, data.customColor);
                    }

                    if (data.layout) {
                        window.layoutAtual = data.layout;
                        document.getElementById('layout-select').value = data.layout;
                        mudarLayout(data.layout);
                    }
                    
                    window.hasUnsavedChanges = false;
                    window.atualizarBotaoSalvar(true);
                    mostrarPagina('externa');
                }
            } catch (e) {
                console.error("Erro ao carregar paciente:", e);
                alert("Erro ao carregar o arquivo.");
            }
        };

        // Deleta permanentemente o arquivo do paciente atual
        window.deletarFolderAtual = async function() {
            if(!currentFolderId) {
                alert("Você precisa carregar um folder salvo primeiro para poder excluir.");
                return;
            }
            if(confirm(`⚠️ ATENÇÃO: Tem certeza que deseja APAGAR permanentemente a prescrição de "${currentFolderId}"?`)) {
                try {
                    await deleteDoc(doc(db, "folders", currentFolderId));
                    await atualizarListaFolders();
                    iniciarFolderEmBranco();
                } catch(e) {
                    alert("Erro ao excluir arquivo.");
                }
            }
        };

        // Botão Novo: Limpa a tela para começar outro paciente
        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("ATENÇÃO: Deseja limpar a tela e começar uma prescrição NOVA do zero?")) {
                iniciarFolderEmBranco();
            }
        });

        function iniciarFolderEmBranco() {
            currentFolderId = "";
            document.getElementById('folder-name-input').value = "";
            document.getElementById('saved-folders-select').value = "";
            
            document.getElementById('main-content-container').innerHTML = document.getElementById('default-template').innerHTML;
            mudarTema('sus-green');
            mudarLayout('6');
            document.getElementById('layout-select').value = '6';
            mostrarPagina('externa');
            
            window.hasUnsavedChanges = false;
            window.atualizarBotaoSalvar(true);
        }

        window.atualizarBotaoSalvar = function(salvo) {
            const btn = document.getElementById('btn-salvar');
            if(salvo) {
                btn.innerHTML = '✅ Salvo!';
                btn.classList.remove('bg-red-500', 'hover:bg-red-400');
                btn.classList.add('bg-amber-500', 'hover:bg-amber-400');
                setTimeout(() => {
                    if(!window.hasUnsavedChanges) btn.innerHTML = '💾 Salvar';
                }, 3000);
            } else {
                btn.innerHTML = '⚠️ Não Salvo';
                btn.classList.remove('bg-amber-500', 'hover:bg-amber-400');
                btn.classList.add('bg-red-500', 'hover:bg-red-400');
            }
        };

        // Função de Salvamento Inteligente
        window.salvarProgresso = async function() {
            if (!auth.currentUser || !db) return;
            
            const inputElement = document.getElementById('folder-name-input');
            const folderName = inputElement.value.trim();

            // Bloqueia se tentar salvar sem dar um nome para a prescrição
            if (!folderName) {
                alert("⚠️ Por favor, digite o NOME DO PACIENTE na barra superior antes de salvar!");
                inputElement.focus();
                inputElement.classList.add('ring-2', 'ring-amber-500');
                setTimeout(() => inputElement.classList.remove('ring-2', 'ring-amber-500'), 2000);
                return;
            }

            const btn = document.getElementById('btn-salvar');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '⏳ Salvando...';

            currentFolderId = folderName;

            const dataToSave = {
                tema: window.temaAtual || 'sus-green',
                customColor: window.customColorHex || null,
                layout: window.layoutAtual || '6',
                htmlContent: document.getElementById('main-content-container').innerHTML,
                atualizadoEm: new Date().toISOString()
            };

            try {
                await setDoc(doc(db, "folders", currentFolderId), dataToSave);
                
                window.hasUnsavedChanges = false;
                window.atualizarBotaoSalvar(true);
                await atualizarListaFolders();
                
            } catch (e) {
                console.error("Erro ao salvar:", e);
                btn.innerHTML = '❌ Erro';
                setTimeout(() => btn.innerHTML = textoOriginal, 3000);
            }
        };
    </script>
