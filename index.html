<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Modelo de Folder - Exercícios Domiciliares (Atenção Básica)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        @media (min-width: 768px) {
            .fold-guide { position: relative; }
            .fold-guide::after { content: ''; position: absolute; top: 0; bottom: 0; width: 1px; border-left: 1px dashed rgba(156, 163, 175, 0.4); pointer-events: none; }
            .fold-left::after { right: 0; }
            .fold-right::after { left: 0; }
            .print-page { width: 100%; aspect-ratio: 297/210; display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 1.5rem !important; }
        }

        @media (max-width: 767px) {
            .print-page:not(.hidden) { display: flex !important; flex-direction: column !important; gap: 2rem !important; height: auto !important; aspect-ratio: auto !important; padding: 1.5rem !important; }
            .print-page.hidden { display: none !important; }
            .fold-guide::after { display: none !important; }
        }

        /* CORREÇÃO DO PDF: Força o navegador a imprimir imagens de fundo, cores e o símbolo da APS */
        @media print {
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
                color-adjust: exact !important;
            }
            @page { size: A4 landscape; margin: 0; }
            body { background: white !important; color: black !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
            .print-page { width: 297mm !important; height: 210mm !important; margin: 0 !important; border: none !important; box-shadow: none !important; padding: 10mm 12mm !important; page-break-after: always !important; display: grid !important; grid-template-columns: repeat(3, 1fr) !important; gap: 12mm !important; box-sizing: border-box !important; background-color: white !important; background-image: none !important; }
            .fold-guide::after { display: none !important; }
            [contenteditable="true"] { outline: none !important; border: none !important; background-color: transparent !important; }
        }

        [contenteditable="true"] { transition: all 0.2s; cursor: text; border-radius: 6px; padding: 2px 4px; }
        [contenteditable="true"]:hover { background-color: rgba(239, 246, 255, 0.9); outline: 1.5px dashed #3b82f6; }
        [contenteditable="true"]:focus { background-color: #ffffff; outline: 2px solid #2563eb; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3); }

        #text-toolbar { transition: opacity 0.2s, transform 0.2s; }
        #text-toolbar::after {
            content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
            border-width: 5px; border-style: solid; border-color: #0f172a transparent transparent transparent;
        }

        .img-upload-area { position: relative; cursor: pointer; transition: all 0.2s; }
        .img-upload-area:hover { outline: 2px dashed #3b82f6; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col relative">

    <div id="text-toolbar" class="no-print fixed z-[200] hidden bg-slate-900 text-white rounded-lg shadow-xl p-1.5 flex items-center gap-1 opacity-0 transform -translate-y-2 pointer-events-auto">
        <button onclick="formatText('bold')" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-700 font-serif font-bold text-base transition-colors" title="Negrito">B</button>
        <div class="w-px h-5 bg-slate-700 mx-1"></div>
        <button onclick="changeFontSize(-1)" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-700 font-bold text-xs transition-colors" title="Diminuir Fonte">A-</button>
        <button onclick="changeFontSize(1)" class="w-8 h-8 flex items-center justify-center rounded hover:bg-slate-700 font-bold text-lg transition-colors" title="Aumentar Fonte">A+</button>
    </div>

    <!-- TELA DE LOGIN -->
    <div id="login-modal" class="fixed inset-0 z-[100] bg-slate-900 flex items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-8 text-center">
            <div class="w-16 h-16 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
            </div>
            <h2 class="text-2xl font-black text-slate-800 mb-2">Acesso Restrito</h2>
            <p class="text-sm text-slate-500 mb-6">Faça login para editar e salvar os folders da unidade.</p>
            <form id="login-form" class="space-y-4 text-left">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">E-mail</label>
                    <input type="email" id="email-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" required>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase tracking-wide mb-1">Senha</label>
                    <input type="password" id="password-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-emerald-500 outline-none transition-all" required>
                </div>
                <div id="login-error" class="text-xs text-red-500 font-bold hidden text-center">Credenciais inválidas. Tente novamente.</div>
                <button type="submit" id="btn-entrar" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded-xl transition-all shadow-md mt-2">
                    Entrar no Sistema
                </button>
            </form>
        </div>
    </div>

    <!-- CABEÇALHO -->
    <header id="main-header" class="no-print bg-slate-900 text-white shadow-md p-4 sticky top-0 z-50 hidden">
        <div class="max-w-7xl mx-auto flex flex-col lg:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3 w-full lg:w-auto">
                <div class="p-2.5 bg-emerald-500 rounded-xl text-slate-900 shrink-0">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" /></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold leading-tight">Editor SUS</h1>
                    <div class="flex items-center gap-2">
                        <p class="text-[11px] text-slate-400" id="user-email-display">usuario@ubs.com</p>
                        <button id="btn-logout" class="text-[10px] font-bold bg-slate-800 hover:bg-slate-700 px-2 py-0.5 rounded text-red-400 transition-colors">Sair</button>
                    </div>
                </div>
            </div>

            <div class="flex flex-col sm:flex-row items-center gap-3 w-full lg:w-auto flex-wrap justify-center">
                
                <!-- SELETOR DE TEMAS COM OPÇÃO MULTICOLORIDA -->
                <div class="flex items-center gap-2.5 bg-slate-800 px-3.5 py-2 rounded-xl">
                    <button onclick="mudarTema('sus-blue')" class="w-6 h-6 rounded-full bg-cyan-600 border-2 border-slate-700 hover:scale-110 transition-transform" title="Azul SUS"></button>
                    <button onclick="mudarTema('sus-green')" class="w-6 h-6 rounded-full bg-emerald-600 border-2 border-slate-700 hover:scale-110 transition-transform" title="Verde Saúde"></button>
                    <button onclick="mudarTema('outubro-rosa')" class="w-6 h-6 rounded-full bg-pink-500 border-2 border-slate-700 hover:scale-110 transition-transform" title="Outubro Rosa"></button>
                    <button onclick="mudarTema('novembro-azul')" class="w-6 h-6 rounded-full bg-blue-600 border-2 border-slate-700 hover:scale-110 transition-transform" title="Novembro Azul"></button>
                    
                    <div class="w-px h-5 bg-slate-600 mx-1"></div>
                    
                    <!-- NOVO BOTÃO DE COR PERSONALIZADA -->
                    <label class="relative cursor-pointer hover:scale-110 transition-transform" title="Escolher Cor Personalizada">
                        <div class="w-6 h-6 rounded-full border-2 border-slate-700" style="background: conic-gradient(red, yellow, lime, aqua, blue, magenta, red);"></div>
                        <input type="color" id="customColorPicker" class="opacity-0 absolute inset-0 w-0 h-0 cursor-pointer">
                    </label>
                </div>

                <div class="inline-flex rounded-xl border border-slate-700 bg-slate-950 p-1 w-full sm:w-auto">
                    <button onclick="mostrarPagina('externa')" id="btn-ext" class="flex-1 px-4 py-2 rounded-lg text-xs font-bold uppercase bg-emerald-500 text-slate-950 transition-all">Capa/Aba</button>
                    <button onclick="mostrarPagina('interna')" id="btn-int" class="flex-1 px-4 py-2 rounded-lg text-xs font-bold uppercase text-slate-400 transition-all">6 Exercícios</button>
                </div>

                <div class="flex gap-2 w-full sm:w-auto">
                    <button id="btn-reset" class="flex-1 sm:flex-none bg-slate-700 hover:bg-slate-600 text-white font-bold px-3 py-2 rounded-xl text-xs uppercase tracking-wider transition-all" title="Restaurar Padrão">
                        🔄 Resetar
                    </button>
                    <button id="btn-salvar" onclick="window.salvarProgresso()" class="flex-1 sm:flex-none bg-amber-500 hover:bg-amber-400 text-slate-900 font-bold px-4 py-2 rounded-xl text-xs md:text-sm uppercase tracking-wider flex items-center justify-center gap-1 shadow-lg transition-all">
                        💾 Salvar
                    </button>
                    <button onclick="abrirImpressao()" class="flex-1 sm:flex-none bg-blue-600 hover:bg-blue-500 text-white font-bold px-4 py-2 rounded-xl text-xs md:text-sm uppercase tracking-wider shadow-lg transition-all">
                        🖨️ Imprimir
                    </button>
                </div>
            </div>
        </div>
    </header>

    <main id="main-content" class="flex-1 max-w-7xl mx-auto w-full p-4 md:p-8 flex flex-col justify-center items-center gap-6 hidden">
        <div class="w-full max-w-5xl" id="main-content-container">
            <!-- Conteúdo Injetado -->
        </div>
    </main>

    <!-- TEMPLATE PADRÃO DO FOLDER -->
    <template id="default-template">
        <!-- PÁGINA 1: EXTERNA -->
        <div id="pagina-externa" class="print-page bg-white shadow-xl rounded-3xl mx-auto border border-slate-200 p-6 md:p-8 relative transition-all duration-300">
            <div class="fold-guide fold-left p-4 flex flex-col justify-between h-full bg-slate-50/50 rounded-2xl border border-slate-100">
                <div>
                    <div class="theme-badge inline-block text-[10px] font-black px-2.5 py-1 rounded uppercase tracking-widest mb-4" contenteditable="true">Dicas Importantes</div>
                    <h3 class="text-base font-black theme-text mb-3 uppercase tracking-tight" contenteditable="true">Preparando o Corpo</h3>
                    <p class="text-xs text-slate-600 mb-4 leading-relaxed font-medium" contenteditable="true">A prática regular de exercícios em casa melhora flexibilidade, equilíbrio e reduz dores crônicas.</p>
                    
                    <div class="space-y-3">
                        <div class="flex gap-2.5 items-start">
                            <span class="text-emerald-500 font-black text-sm" contenteditable="true">✓</span>
                            <p class="text-xs text-slate-600 leading-tight" contenteditable="true"><strong>Roupas Leves:</strong> Use tecidos confortáveis e faça os exercícios de tênis ou descalço em local seguro.</p>
                        </div>
                        <div class="flex gap-2.5 items-start">
                            <span class="text-emerald-500 font-black text-sm" contenteditable="true">✓</span>
                            <p class="text-xs text-slate-600 leading-tight" contenteditable="true"><strong>Hidratação:</strong> Beba pequenos goles de água antes e durante a rotina.</p>
                        </div>
                        <div class="flex gap-2.5 items-start">
                            <span class="text-emerald-500 font-black text-sm" contenteditable="true">✓</span>
                            <p class="text-xs text-slate-600 leading-tight" contenteditable="true"><strong>Sinais de Alerta:</strong> Pare se sentir tontura, falta de ar ou dores articulares agudas.</p>
                        </div>
                    </div>
                </div>
                <div class="mt-6 pt-4 border-t border-slate-100 text-center">
                    <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider" contenteditable="true">Atenção Básica: Cuidado Contínuo</p>
                </div>
            </div>

            <div class="fold-guide fold-right p-4 flex flex-col justify-between h-full bg-white">
                <div class="text-center">
                    <div class="theme-bg-light p-4 rounded-2xl mb-4 flex justify-center border border-slate-50">
                        <div class="flex items-center gap-2 font-black text-sm tracking-widest text-slate-800">
                            <!-- ÍCONE APS COM A CLASSE theme-text-svg PARA COLORIR NO PDF -->
                            <svg class="w-6 h-6 theme-text-svg" fill="currentColor" viewBox="0 0 24 24">
                                <path d="M19 10.5h-5.5V5c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v5.5H5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5h5.5V19c0 .83.67 1.5 1.5 1.5s1.5-.67 1.5-1.5v-5.5H19c.83 0 1.5-.67 1.5-1.5s-.67-1.5-1.5-1.5z"/>
                            </svg>
                            <span contenteditable="true">SUS / APS</span>
                        </div>
                    </div>
                    <h3 class="text-xs font-black text-slate-800 uppercase tracking-widest mb-2" contenteditable="true">Acompanhamento</h3>
                    <p class="text-[11px] text-slate-500 mb-4" contenteditable="true">Anote as informações da sua equipe de saúde de referência:</p>
                    
                    <div class="space-y-3 text-left">
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 shadow-sm">
                            <span class="text-[9px] uppercase font-bold text-slate-400 block tracking-wider mb-1" contenteditable="true">Unidade de Saúde (UBS):</span>
                            <span class="text-xs text-slate-700 font-bold block" contenteditable="true">UBS Centro - PSF 01</span>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 shadow-sm">
                            <span class="text-[9px] uppercase font-bold text-slate-400 block tracking-wider mb-1" contenteditable="true">Seu Agente de Saúde (ACS):</span>
                            <span class="text-xs text-slate-700 font-bold block" contenteditable="true">Nome do Agente</span>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl border border-slate-100 shadow-sm">
                            <span class="text-[9px] uppercase font-bold text-slate-400 block tracking-wider mb-1" contenteditable="true">Dúvidas / Contato:</span>
                            <span class="text-xs text-slate-700 font-bold block" contenteditable="true">(88) 99999-9999</span>
                        </div>
                    </div>
                </div>
                <div class="mt-4 pt-4 border-t border-slate-100 text-center">
                    <span class="text-[10px] text-slate-400 font-medium block" contenteditable="true">Leve este folder em suas consultas!</span>
                </div>
            </div>

            <div class="p-4 flex flex-col justify-between h-full rounded-2xl relative overflow-hidden bg-gradient-to-br from-slate-50 to-white text-center">
                <div class="text-right flex justify-end gap-1 mb-2">
                    <span class="w-2.5 h-2.5 rounded-full theme-bg"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-emerald-500"></span>
                    <span class="w-2.5 h-2.5 rounded-full bg-yellow-400"></span>
                </div>

                <div class="my-auto py-4">
                    <div class="flex justify-center mb-6">
                        <div class="img-upload-area w-24 h-24 md:w-28 md:h-28 rounded-full theme-bg flex items-center justify-center text-white shadow-lg overflow-hidden group" onclick="triggerImageUpload(this, 'circle')">
                            <div id="container-img-capa" class="w-full h-full flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-14 h-14 md:w-16 md:h-16">
                                    <path d="M12 18.5l-1.45-1.32C5.4 12.36 2 9.28 2 5.5 2 2.42 4.42 0 7.5 0c1.74 0 3.41.81 4.5 2.09C13.09 0.81 14.76 0 16.5 0 19.58 0 22 2.42 22 5.5c0 3.78-3.4 6.86-8.55 11.54L12 18.5z" />
                                    <path d="M21.5 16h-3.37c-1.12 0-2.18.53-2.83 1.42L14 19h-4l-1.3-1.58A3.49 3.49 0 005.87 16H2.5C1.12 16 0 17.12 0 18.5V20c0 2.21 1.79 4 4 4h12c2.21 0 4-1.79 4-4v-2c0-1.1-.9-2-2-2z" opacity="0.3"/>
                                </svg>
                            </div>
                            <div class="absolute inset-0 bg-black/40 hidden group-hover:flex items-center justify-center text-[10px] font-bold text-white uppercase backdrop-blur-sm transition-all text-center leading-tight">Trocar<br>Foto</div>
                        </div>
                    </div>
                    
                    <h1 class="text-2xl font-black text-slate-800 leading-tight uppercase tracking-tight" contenteditable="true">Mexa-se<br>Com Saúde!</h1>
                    <div class="w-12 h-1.5 theme-bg mx-auto my-4 rounded-full"></div>
                    <h2 class="text-xs font-black theme-text uppercase tracking-widest" contenteditable="true">Exercícios Domiciliares</h2>
                    <p class="text-xs text-slate-500 mt-3 max-w-[220px] mx-auto leading-relaxed" contenteditable="true">Pequenos hábitos, grandes resultados para o seu dia a dia.</p>
                </div>

                <div class="border-t border-slate-100 pt-3 flex items-center justify-between text-left text-[9px] text-slate-500 font-bold uppercase tracking-wider">
                    <div><p contenteditable="true">Apoio: Min. da Saúde</p></div>
                    <div class="text-right"><p contenteditable="true">Equipe eMulti / NASF</p></div>
                </div>
            </div>
        </div>

        <!-- PÁGINA 2: INTERNA -->
        <div id="pagina-interna" class="print-page bg-white shadow-xl rounded-3xl mx-auto border border-slate-200 p-4 md:p-6 relative transition-all duration-300 hidden">
            <!-- COLUNA 1 -->
            <div class="fold-guide fold-left p-3 flex flex-col gap-3 h-full bg-slate-50/50 rounded-2xl border border-slate-100">
                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-5 h-5 rounded-full theme-bg text-white font-black text-[10px] flex items-center justify-center shrink-0" contenteditable="true">1</span>
                            <h3 class="text-xs font-black text-slate-800 uppercase tracking-tight leading-tight" contenteditable="true">Pescoço</h3>
                        </div>
                        <!-- ALTURA DA IMAGEM AUMENTADA (h-[100px]) -->
                        <div class="img-upload-area w-full h-[100px] theme-bg-light rounded-xl mb-2 flex items-center justify-center border border-dashed border-slate-300 group overflow-hidden" onclick="triggerImageUpload(this, 'rect')">
                            <div id="container-img-ex1" class="w-full h-full flex items-center justify-center">
                                <svg class="w-10 h-10 theme-text-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.828 14.828a4 4 0 01-5.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /><path stroke-linecap="round" stroke-linejoin="round" d="M10 14h4" /></svg>
                            </div>
                            <div class="absolute inset-0 bg-blue-500/80 hidden group-hover:flex items-center justify-center text-[9px] font-bold text-white uppercase backdrop-blur-sm">📷 Add Foto</div>
                        </div>
                        <p class="text-[10px] text-slate-700 leading-tight font-medium mb-1.5" contenteditable="true"><strong>Como fazer:</strong> Incline a cabeça lentamente em direção ao ombro. Mantenha os ombros relaxados.</p>
                        
                        <div class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 space-y-1 mb-1.5">
                            <div class="flex justify-between text-[9px] border-b border-slate-100 pb-1">
                                <span class="text-slate-500 font-semibold" contenteditable="true">Séries:</span><span class="font-black text-slate-800" contenteditable="true">3 de 10x</span>
                            </div>
                            <div class="flex justify-between text-[9px]">
                                <span class="text-slate-500 font-semibold" contenteditable="true">Intervalo:</span><span class="font-black text-slate-800" contenteditable="true">45 segs</span>
                            </div>
                        </div>
                    </div>
                    <div class="bg-amber-50 text-amber-900 px-2 py-1.5 rounded-lg border border-amber-200 shadow-sm mt-auto">
                        <p class="text-[9px] leading-tight font-bold" contenteditable="true">⚠️ <strong>Dica:</strong> Não prenda o ar durante o exercício.</p>
                    </div>
                </div>

                <hr class="border-dashed border-slate-200 my-0.5">

                <div class="flex-1 flex flex-col justify-between">
                    <div>
                        <div class="flex items-center gap-2 mb-2">
                            <span class="w-5 h-5 rounded-full theme-bg text-white font-black text-[10px] flex items-center justify-center shrink-0" contenteditable="true">2</span>
                            <h3 class="text-xs font-black text-slate-800 uppercase tracking-tight leading-tight" contenteditable="true">Girar Ombros</h3>
                        </div>
                        <div class="img-upload-area w-full h-[100px] theme-bg-light rounded-xl mb-2 flex items-center justify-center border border-dashed border-slate-300 group overflow-hidden" onclick="triggerImageUpload(this, 'rect')">
                            <div id="container-img-ex2" class="w-full h-full flex items-center justify-center">
                                <svg class="w-10 h-10 theme-text-svg" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" /></svg>
                            </div>
                            <div class="absolute inset-0 bg-blue-500/80 hidden group-hover:flex items-center justify-center text-[9px] font-bold text-white uppercase backdrop-blur-sm">📷 Add Foto</div>
                        </div>
                        <p class="text-[10px] text-slate-700 leading-tight font-medium mb-1.5" contenteditable="true"><strong>Como fazer:</strong> Faça movimentos circulares com os ombros para trás e depois para frente, suavemente.</p>
                        
                        <div class="bg-white p-2 rounded-lg shadow-sm border border-slate-200 space-y-1 mb-1.5">
                            <div class="flex justify-between text-[9px] border-b border-slate-100 pb-1">
                                <span class="text-slate-500 font-semibold" contenteditable="true">Séries:</span><span class="font-black text-slate-800" contenteditable="true">3 de 10x</span>
                            </div>
                            <div class="flex justify-between text-[9px]">
                                <span class="text-slate-500 font-semibold" contenteditable="true">Intervalo:</span><span class="font-black text-slate-800" contenteditable="true">45 segs</span>
                            </div>

    <script>
        const toolbar = document.getElementById('text-toolbar');
        let activeEditable = null;

        document.addEventListener('mouseup', (e) => {
            let target = e.target;
            while (target && target !== document && !target.isContentEditable) {
                target = target.parentNode;
            }

            if (target && target.isContentEditable) {
                activeEditable = target;
                showToolbar(target);
            } else if (!toolbar.contains(e.target)) {
                hideToolbar();
                activeEditable = null;
            }
        });

        toolbar.addEventListener('mousedown', (e) => { e.preventDefault(); });

        function showToolbar(el) {
            const rect = el.getBoundingClientRect();
            toolbar.classList.remove('hidden');
            toolbar.style.top = `${Math.max(10, rect.top - 45)}px`; 
            toolbar.style.left = `${rect.left + (rect.width/2) - (toolbar.offsetWidth/2)}px`;
            setTimeout(() => { toolbar.classList.remove('opacity-0', '-translate-y-2'); toolbar.classList.add('opacity-100', 'translate-y-0'); }, 10);
        }

        function hideToolbar() {
            toolbar.classList.remove('opacity-100', 'translate-y-0');
            toolbar.classList.add('opacity-0', '-translate-y-2');
            setTimeout(() => toolbar.classList.add('hidden'), 200);
        }

        function formatText(command) { document.execCommand(command, false, null); if (activeEditable) activeEditable.focus(); }

        function changeFontSize(step) {
            if (!activeEditable) return;
            const style = window.getComputedStyle(activeEditable);
            let currentSize = parseFloat(style.fontSize);
            let newSize = currentSize + (step * 2);
            activeEditable.style.fontSize = `${newSize}px`;
            activeEditable.style.lineHeight = '1.3'; 
            showToolbar(activeEditable);
        }

        let alvoImagemAtual = null;
        let formatoImagemAtual = 'rect';

        function triggerImageUpload(elemento, formato) {
            alvoImagemAtual = elemento;
            formatoImagemAtual = formato;
            document.getElementById('imageUploader').click();
        }

        document.getElementById('imageUploader').addEventListener('change', function(event) {
            const arquivo = event.target.files[0];
            if (arquivo && alvoImagemAtual) {
                const leitor = new FileReader();
                leitor.onload = function(e) {
                    const imgObj = new Image();
                    imgObj.onload = function() {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 800; 
                        let width = imgObj.width, height = imgObj.height;
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                        canvas.width = width; canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(imgObj, 0, 0, width, height);
                        
                        const base64Comprimido = canvas.toDataURL('image/jpeg', 0.8);
                        alvoImagemAtual.innerHTML = '';
                        alvoImagemAtual.classList.remove('border-2', 'border-dashed', 'border-slate-300');
                        alvoImagemAtual.style.padding = '0';
                        
                        const imgNode = document.createElement('img');
                        imgNode.src = base64Comprimido;
                        imgNode.className = formatoImagemAtual === 'circle' ? 'w-full h-full object-cover rounded-full' : 'w-full h-full object-cover rounded-xl';
                        alvoImagemAtual.appendChild(imgNode);
                    };
                    imgObj.src = e.target.result;
                };
                leitor.readAsDataURL(arquivo);
            }
            event.target.value = '';
        });

        function abrirImpressao() { window.print(); }

        function mostrarPagina(pagina) {
            const pagExt = document.getElementById('pagina-externa');
            const pagInt = document.getElementById('pagina-interna');
            const btnExt = document.getElementById('btn-ext');
            const btnInt = document.getElementById('btn-int');

            if (pagina === 'externa') {
                pagExt.classList.remove('hidden'); pagInt.classList.add('hidden');
                btnExt.classList.add('bg-emerald-500', 'text-slate-950'); btnExt.classList.remove('text-slate-400');
                btnInt.classList.remove('bg-emerald-500', 'text-slate-950'); btnInt.classList.add('text-slate-400');
            } else {
                pagInt.classList.remove('hidden'); pagExt.classList.add('hidden');
                btnInt.classList.add('bg-emerald-500', 'text-slate-950'); btnInt.classList.remove('text-slate-400');
                btnExt.classList.remove('bg-emerald-500', 'text-slate-950'); btnExt.classList.add('text-slate-400');
            }
        }

        const configuracoesTemas = {
            'sus-blue': { bg: 'bg-cyan-600', text: 'text-cyan-600', badgeBg: 'bg-cyan-100', badgeText: 'text-cyan-900', lightBg: 'bg-cyan-50' },
            'sus-green': { bg: 'bg-emerald-600', text: 'text-emerald-600', badgeBg: 'bg-emerald-100', badgeText: 'text-emerald-900', lightBg: 'bg-emerald-50/40' },
            'outubro-rosa': { bg: 'bg-pink-500', text: 'text-pink-500', badgeBg: 'bg-pink-100', badgeText: 'text-pink-900', lightBg: 'bg-pink-50/40' },
            'novembro-azul': { bg: 'bg-blue-600', text: 'text-blue-600', badgeBg: 'bg-blue-100', badgeText: 'text-blue-900', lightBg: 'bg-blue-50/40' }
        };

        window.temaAtual = 'sus-green'; 
        window.customColorHex = null;

        // Lógica do Color Picker Nativo
        document.getElementById('customColorPicker').addEventListener('input', (e) => {
            mudarTema('custom', e.target.value);
        });

        function mudarTema(nomeTema, customHex = null) {
            window.temaAtual = nomeTema;
            
            // 1. Limpa os estilos inlines caso o usuário saia do modo "Custom"
            document.querySelectorAll('.theme-bg, .theme-text, .theme-text-svg, .theme-badge, .theme-bg-light').forEach(el => {
                el.style.backgroundColor = '';
                el.style.color = '';
            });

            if (nomeTema === 'custom') {
                window.customColorHex = customHex;
                // Aplica a cor escolhida via Inline Styles para sobrescrever o Tailwind
                document.querySelectorAll('.theme-bg').forEach(el => { el.style.backgroundColor = customHex; });
                document.querySelectorAll('.theme-text').forEach(el => { el.style.color = customHex; });
                document.querySelectorAll('.theme-text-svg').forEach(el => { el.style.color = customHex; });
                document.querySelectorAll('.theme-badge').forEach(el => { 
                    el.style.backgroundColor = customHex + '20'; // cor + 20 de opacidade
                    el.style.color = customHex; 
                });
                document.querySelectorAll('.theme-bg-light').forEach(el => { 
                    el.style.backgroundColor = customHex + '15'; // cor + 15 de opacidade
                });
            } else {
                window.customColorHex = null;
                const configs = configuracoesTemas[nomeTema];
                document.querySelectorAll('.theme-bg').forEach(el => { el.classList.remove('bg-cyan-600', 'bg-emerald-600', 'bg-pink-500', 'bg-blue-600'); el.classList.add(configs.bg); });
                document.querySelectorAll('.theme-text').forEach(el => { el.classList.remove('text-cyan-600', 'text-emerald-600', 'text-pink-500', 'text-blue-600', 'text-teal-700'); el.classList.add(configs.text); });
                document.querySelectorAll('.theme-text-svg').forEach(el => { el.classList.remove('text-cyan-600', 'text-emerald-600', 'text-pink-500', 'text-blue-600'); el.classList.add(configs.text); });
                document.querySelectorAll('.theme-badge').forEach(el => { el.className = `theme-badge inline-block text-[10px] font-black px-2.5 py-1 rounded uppercase tracking-widest mb-4 ${configs.badgeBg} ${configs.badgeText}`; });
                document.querySelectorAll('.theme-bg-light').forEach(el => { el.classList.remove('bg-cyan-50', 'bg-emerald-50/40', 'bg-pink-50/40', 'bg-blue-50/40'); el.classList.add(configs.lightBg); });
            }
        }

        function renovarIdsDinamicos() {
            document.querySelectorAll('#main-content-container [contenteditable="true"]').forEach((el, index) => { el.id = 'editable-' + index; });
            document.querySelectorAll('#main-content-container [onclick^="triggerImageUpload"]').forEach((el, index) => { el.id = 'img-target-' + index; });
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
          apiKey: "AIzaSyD0l49VdT8hB8dxyS1LxU5lDAY_Bcs08tc",
          authDomain: "foldermaker-55c5e.firebaseapp.com",
          projectId: "foldermaker-55c5e",
          storageBucket: "foldermaker-55c5e.firebasestorage.app",
          messagingSenderId: "831477487081",
          appId: "1:831477487081:web:5e8ca0f38be76d2d832778"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const DADOS_DOC_ID = "folder_padrao";

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('login-modal').classList.add('hidden');
                document.getElementById('main-header').classList.remove('hidden');
                document.getElementById('main-content').classList.remove('hidden');
                document.getElementById('user-email-display').textContent = user.email;
                carregarProgresso();
            } else {
                document.getElementById('login-modal').classList.remove('hidden');
                document.getElementById('main-header').classList.add('hidden');
                document.getElementById('main-content').classList.add('hidden');
            }
        });

        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value;
            const pass = document.getElementById('password-input').value;
            const btn = document.getElementById('btn-entrar');
            btn.textContent = "Verificando...";
            document.getElementById('login-error').classList.add('hidden');

            signInWithEmailAndPassword(auth, email, pass).catch((error) => {
                btn.textContent = "Entrar no Sistema";
                document.getElementById('login-error').classList.remove('hidden');
            });
        });

        document.getElementById('btn-logout').addEventListener('click', () => signOut(auth));

        document.getElementById('btn-reset').addEventListener('click', () => {
            if(confirm("ATENÇÃO: Deseja apagar todas as edições e fotos e carregar o modelo de fábrica?")) {
                document.getElementById('main-content-container').innerHTML = document.getElementById('default-template').innerHTML;
                renovarIdsDinamicos();
                mudarTema('sus-green');
                mostrarPagina('externa');
                window.salvarProgresso();
            }
        });

        window.salvarProgresso = async function() {
            if (!auth.currentUser || !db) return;
            const btn = document.getElementById('btn-salvar');
            const textoOriginal = btn.innerHTML;
            btn.innerHTML = '⏳ Salvando...';

            renovarIdsDinamicos(); 

            const textos = {};
            document.querySelectorAll('#main-content-container [contenteditable="true"]').forEach(el => {
                textos[el.id] = { html: el.innerHTML, size: el.style.fontSize };
            });

            const imagens = {};
            document.querySelectorAll('#main-content-container [onclick^="triggerImageUpload"]').forEach(el => {
                const img = el.querySelector('img');
                if (img) imagens[el.id] = img.src;
            });

            const dataToSave = {
                tema: window.temaAtual || 'sus-green',
                customColor: window.customColorHex || null,
                textos: textos,
                imagens: imagens,
                atualizadoEm: new Date().toISOString()
            };

            try {
                await setDoc(doc(db, "folders", DADOS_DOC_ID), dataToSave);
                btn.innerHTML = '✅ Salvo!';
                setTimeout(() => btn.innerHTML = textoOriginal, 3000);
            } catch (e) {
                console.error("Erro ao salvar:", e);
                btn.innerHTML = '❌ Erro';
                setTimeout(() => btn.innerHTML = textoOriginal, 3000);
            }
        };

        async function carregarProgresso() {
            try {
                document.getElementById('main-content-container').innerHTML = document.getElementById('default-template').innerHTML;
                renovarIdsDinamicos();

                const docSnap = await getDoc(doc(db, "folders", DADOS_DOC_ID));
                
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    if (data.tema) {
                        if (data.tema === 'custom' && data.customColor) {
                            mudarTema('custom', data.customColor);
                        } else {
                            mudarTema(data.tema);
                        }
                    } else {
                        mudarTema('sus-green');
                    }
                    
                    if (data.textos) {
                        for (const [id, config] of Object.entries(data.textos)) {
                            const el = document.getElementById(id);
                            if (el) {
                                el.innerHTML = config.html || config; 
                                if (config.size) el.style.fontSize = config.size;
                            }
                        }
                    }
                    
                    if (data.imagens) {
                        for (const [id, src] of Object.entries(data.imagens)) {
                            const container = document.getElementById(id);
                            if (container) {
                                container.innerHTML = '';
                                container.classList.remove('border-2', 'border-dashed', 'border-slate-300');
                                container.style.padding = '0';
                                const img = document.createElement('img');
                                img.src = src;
                                img.className = container.getAttribute('onclick').includes('circle') ? 'w-full h-full object-cover rounded-full' : 'w-full h-full object-cover rounded-xl';
                                container.appendChild(img);
                            }
                        }
                    }
                } else {
                    mudarTema('sus-green');
                }
                
                mostrarPagina('externa');
            } catch (e) {
                console.error("Erro ao carregar:", e);
            }
        }
    </script>
